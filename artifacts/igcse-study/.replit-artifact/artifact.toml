kind = "web"
previewPath = "/"
title = "IGCSE Study Platform"
version = "1.0.0"
id = "artifacts/igcse-study"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18184

[services.development]
run = "pnpm --filter @workspace/igcse-study run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/igcse-study", "run", "build" ]
publicDir = "artifacts/igcse-study/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18184"
BASE_PATH = "/"
